<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Ganga Satwik — HR Professional | Portfolio & Blog</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --card: #181c26;
  --border: #252a38;
  --gold: #c9a84c;
  --gold-light: #e4c97a;
  --gold-dim: rgba(201,168,76,0.12);
  --teal: #3ecfb2;
  --teal-dim: rgba(62,207,178,0.10);
  --ink: #f0ece4;
  --body: #a8a49c;
  --muted: #5e5c58;
  --white: #ffffff;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  font-size: 16px;
  min-height: 100vh;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: 
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

.nav {
  background: rgba(13,15,20,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
  display: flex; align-items: center;
  height: 56px;
  position: sticky; top: 0; z-index: 100;
  gap: 20px;
}

.nav-logo {
  font-family: 'Playfair Display', serif;
  font-size: 20px; font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  flex-shrink: 0;
}

.nav-tagline {
  font-size: 12px; color: var(--muted);
  letter-spacing: 1px; text-transform: uppercase;
  border-left: 1px solid var(--border);
  padding-left: 20px;
}

.nav-right {
  margin-left: auto;
  display: flex; gap: 8px; align-items: center;
}

.nav-pill {
  font-size: 12px; font-weight: 500;
  color: var(--body);
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  background: transparent;
}
.nav-pill:hover { border-color: var(--gold); color: var(--gold); }
.nav-pill.active {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold);
}

.page-wrap {
  max-width: 1140px;
  margin: 40px auto;
  padding: 0 20px;
  display: grid;
  grid-template-columns: 1fr 290px;
  gap: 28px;
  align-items: start;
  position: relative; z-index: 1;
}

.main-col { display: flex; flex-direction: column; gap: 20px; }

/* PROFILE CARD (static) */
.profile-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: riseUp 0.7s 0.1s both;
  position: relative;
}

.profile-banner {
  height: 160px;
  background: linear-gradient(135deg, #0a0c10 0%, #1a1200 40%, #2d1f00 70%, #1a0f00 100%);
  position: relative; overflow: hidden;
}
.profile-banner::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,168,76,0.25) 0%, transparent 60%),
              radial-gradient(ellipse 40% 40% at 20% 80%, rgba(62,207,178,0.1) 0%, transparent 60%);
}
.banner-lines::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(-55deg, transparent, transparent 20px, rgba(201,168,76,0.04) 20px, rgba(201,168,76,0.04) 21px);
  pointer-events: none;
}
.profile-avatar {
  width: 120px; height: 120px;
  border-radius: 50%;
  border: 3px solid var(--gold);
  box-shadow: 0 0 0 6px rgba(201,168,76,0.12), 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden;
  position: absolute;
  top: 100px; left: 32px;
  z-index: 2;
  background: var(--card);
}
.profile-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
}
.profile-body {
  padding: 20px 32px 28px;
  margin-top: 72px;
}
.open-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(62,207,178,0.12);
  border: 1px solid rgba(62,207,178,0.3);
  color: var(--teal);
  font-size: 11px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 12px; border-radius: 20px;
  margin-bottom: 12px;
}
.open-badge::before { content: '●'; font-size: 7px; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

.profile-name {
  font-family: 'Playfair Display', serif;
  font-size: 28px; font-weight: 700;
  color: var(--ink); line-height: 1.15;
  margin-bottom: 6px;
}
.profile-headline {
  font-size: 14px; color: var(--body);
  margin-bottom: 4px; line-height: 1.5;
}
.profile-location {
  font-size: 13px; color: var(--muted);
  margin-bottom: 20px;
}
.profile-location span { color: var(--gold); }
.profile-actions { display: flex; gap: 10px; flex-wrap: wrap; }

.btn-gold {
  background: var(--gold);
  color: #0a0800; border: none;
  border-radius: 8px; padding: 9px 22px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s; letter-spacing: 0.3px;
}
.btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
.btn-outline {
  background: transparent; color: var(--gold);
  border: 1px solid var(--gold);
  border-radius: 8px; padding: 9px 22px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}
.btn-outline:hover { background: var(--gold-dim); }

/* ARTICLE CARD (dynamic content container) */
.article-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  animation: riseUp 0.7s 0.25s both;
  transition: all 0.2s;
}

/* dynamic content styling */
.dynamic-content {
  width: 100%;
}
.article-banner, .article-body, .reactions-bar {
  transition: all 0.2s;
}

/* Timeline & other styles reused */
.timeline { margin: 8px 0 24px; display: flex; flex-direction: column; }
.timeline-item {
  display: grid; grid-template-columns: 14px 1fr;
  gap: 20px; padding-bottom: 32px;
}
.timeline-item:last-child { padding-bottom: 0; }
.tl-dot-wrap { display: flex; flex-direction: column; align-items: center; padding-top: 5px; }
.tl-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--gold); box-shadow: 0 0 10px rgba(201,168,76,0.5); flex-shrink: 0; }
.tl-line { flex: 1; width: 1px; background: var(--border); margin-top: 6px; }
.timeline-item:last-child .tl-line { display: none; }
.tl-role { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 2px; }
.tl-company { font-size: 13px; color: var(--gold); font-weight: 500; margin-bottom: 2px; }
.tl-period { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
.tl-desc { font-size: 14px; color: var(--body); line-height: 1.75; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 24px; }
.tag-pill {
  background: transparent;
  color: var(--teal);
  border: 1px solid rgba(62,207,178,0.25);
  border-radius: 6px;
  padding: 5px 14px; font-size: 13px; font-weight: 500;
  cursor: default; transition: all 0.2s;
}
.tag-pill:hover { background: var(--teal-dim); border-color: var(--teal); }

.edu-list { list-style: none; display: flex; flex-direction: column; margin: 8px 0; }
.edu-item { display: flex; gap: 16px; padding: 18px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.edu-item:last-child { border-bottom: none; }
.edu-icon { width: 42px; height: 42px; border-radius: 8px; background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.edu-degree { font-size: 15px; font-weight: 600; color: var(--ink); }
.edu-school { font-size: 13px; color: var(--body); margin-bottom: 2px; }
.edu-year { font-size: 12px; color: var(--muted); }

.callout {
  background: rgba(62,207,178,0.06);
  border: 1px solid rgba(62,207,178,0.2);
  border-radius: 10px; padding: 20px 24px; margin: 28px 0;
  display: flex; gap: 14px; align-items: flex-start;
}
.callout-icon { font-size: 22px; flex-shrink: 0; margin-top: 2px; }
.callout-text { font-size: 14px; color: var(--body); line-height: 1.75; }
.callout-text strong { font-weight: 600; color: var(--teal); }

.reactions-bar {
  padding: 16px 44px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between;
  flex-wrap: wrap; gap: 12px;
}
.reactions-left { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
.reaction-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 13px; color: var(--muted);
  cursor: pointer; background: transparent;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s; font-weight: 500;
}
.reaction-btn:hover { background: var(--gold-dim); color: var(--gold); border-color: rgba(201,168,76,0.3); }
.reactions-right { display: flex; gap: 8px; }

.sidebar {
  display: flex; flex-direction: column; gap: 18px;
  animation: riseUp 0.7s 0.4s both;
  position: sticky; top: 76px;
}
.sidebar-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 22px;
}
.sidebar-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 15px; font-weight: 600; color: var(--ink);
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.3px;
}
.sidebar-stat { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; }
.sidebar-stat:last-child { border-bottom: none; }
.sidebar-stat-label { color: var(--muted); }
.sidebar-stat-val { font-weight: 600; color: var(--gold); }
.cert-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: center; }
.cert-item:last-child { border-bottom: none; }
.cert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; box-shadow: 0 0 6px rgba(201,168,76,0.5); }
.cert-name { font-size: 13px; color: var(--ink); font-weight: 500; }
.cert-org { font-size: 12px; color: var(--muted); }
.contact-link { display: flex; align-items: center; gap: 10px; padding: 9px 0; font-size: 13px; color: var(--body); border-bottom: 1px solid rgba(255,255,255,0.04); text-decoration: none; transition: color 0.2s; }
.contact-link:last-child { border-bottom: none; }
.contact-link:hover { color: var(--gold); }
.contact-icon { font-size: 16px; width: 20px; text-align: center; }

@keyframes riseUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 860px) {
  .page-wrap { grid-template-columns: 1fr; }
  .sidebar { position: static; order: -1; }
  .article-body { padding: 28px 24px; }
  .article-banner { padding: 36px 24px 28px; }
  .reactions-bar { padding: 14px 24px; }
}

/* contact form */
.contact-form {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.contact-form input, .contact-form textarea {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--ink);
  resize: vertical;
}
.contact-form input:focus, .contact-form textarea:focus {
  outline: none;
  border-color: var(--gold);
}
.btn-submit {
  background: var(--gold);
  border: none;
  padding: 10px;
  border-radius: 40px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}
.btn-submit:hover { background: var(--gold-light); transform: translateY(-1px); }
</style>
</head>
